<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>modernEES</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f6; }
      .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
      .card { background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
      textarea, input, select { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 6px; }
      button { margin-top: 8px; padding: 8px 10px; cursor: pointer; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #equations { min-height: 220px; }
      #diagnostics { min-height: 120px; }
      .diagnostics-list { display: flex; flex-direction: column; gap: 6px; }
      .diag-item {
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 6px;
        text-align: left;
        width: 100%;
        background: #f9fafb;
        cursor: pointer;
      }
      .diag-item:hover { background: #eff6ff; border-color: #93c5fd; }
      .diag-meta { font-size: 11px; color: #374151; }
      .diag-message { margin-top: 2px; font-size: 12px; white-space: pre-wrap; }
      .diag-summary { margin-bottom: 8px; font-size: 12px; color: #111827; }
      #resultsGrid { max-height: 220px; overflow: auto; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 4px; font-size: 12px; }
      #plotCanvas { width: 100%; height: 260px; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="card">
        <h3>Equations Editor</h3>
        <textarea id="equations" class="mono">x + y = 10
x - y = 2</textarea>
        <button id="analyzeBtn">Analyze</button>
        <button id="solveBtn">Solve</button>
      </div>

      <div class="card">
        <h3>Diagnostics</h3>
        <div id="diagnostics" class="mono"></div>
        <h4>Variables / Results</h4>
        <div id="variables" class="mono"></div>
      </div>

      <div class="card">
        <h3>Param Table</h3>
        <label>Sweeps JSON</label>
        <textarea id="sweeps" class="mono">[
  {"var":"x","values":[1,2,3,4]}
]</textarea>
        <label>Columns JSON</label>
        <textarea id="columns" class="mono">[
  {"name":"x","expression":"x"},
  {"name":"y","expression":"y"}
]</textarea>
        <button id="runTableBtn">Run Table</button>
        <div id="resultsGrid"></div>
      </div>

      <div class="card">
        <h3>Plot</h3>
        <label>X Column</label>
        <select id="xCol"></select>
        <label>Y Column</label>
        <select id="yCol"></select>
        <canvas id="plotCanvas" width="600" height="260"></canvas>
      </div>
    </div>

    <script>
      const invoke = window.__TAURI__?.core?.invoke;
      const listen = window.__TAURI__?.event?.listen;
      const el = (id) => document.getElementById(id);
      let latestRows = [];
      let currentFilePath = null;
      let currentSummary = '';

      function lineColumnLabel(span) {
        if (!span || !span.line || !span.column) return 'L?:?';
        return `L${span.line}:${span.column}`;
      }

      function toOffset(lines, line, column) {
        const lineIndex = Math.max(0, Math.min((line || 1) - 1, lines.length - 1));
        const lineStart = lines.slice(0, lineIndex).reduce((sum, entry) => sum + entry.length + 1, 0);
        const colIndex = Math.max(0, Math.min((column || 1) - 1, (lines[lineIndex] || '').length));
        return lineStart + colIndex;
      }

      function focusEditorSpan(span) {
        const editor = el('equations');
        const lines = editor.value.split('\n');
        const start = toOffset(lines, span?.line, span?.column);
        const hasRange = span && Number.isFinite(span.end_line) && Number.isFinite(span.end_column)
          && (span.end_line > span.line || (span.end_line === span.line && span.end_column > span.column));
        const end = hasRange ? toOffset(lines, span.end_line, span.end_column) : start;

        editor.focus();
        editor.setSelectionRange(start, end);
      }

      function showDiagnostics({ summary = '', diagnostics = [], textLines = [] } = {}) {
        currentSummary = summary || '';
        const panel = el('diagnostics');
        panel.innerHTML = '';

        if (currentSummary) {
          const summaryEl = document.createElement('div');
          summaryEl.className = 'diag-summary';
          summaryEl.textContent = currentSummary;
          panel.appendChild(summaryEl);
        }

        if (diagnostics.length) {
          const list = document.createElement('div');
          list.className = 'diagnostics-list';
          diagnostics.forEach((diag) => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'diag-item';
            const sev = (diag.severity || diag.source || 'info').toUpperCase();
            item.innerHTML = `<div class="diag-meta">${sev} • ${lineColumnLabel(diag.span)}</div><div class="diag-message">${diag.message}</div>`;
            if (diag.span) {
              item.onclick = () => focusEditorSpan(diag.span);
            } else {
              item.disabled = true;
            }
            list.appendChild(item);
          });
          panel.appendChild(list);
        } else if (textLines.length) {
          const plain = document.createElement('div');
          plain.textContent = textLines.join('\n');
          panel.appendChild(plain);
        } else if (!currentSummary) {
          panel.textContent = 'No diagnostics';
        }
      }

      function showVariables(vars) {
        const entries = Object.entries(vars || {}).sort((a, b) => a[0].localeCompare(b[0]));
        el('variables').textContent = entries.length
          ? entries.map(([k, v]) => `${k} = ${v}`).join('\n')
          : 'No variables';
      }

      function clearWorkspace() {
        el('equations').value = '';
        showDiagnostics();
        showVariables({});
        renderRows([]);
        currentFilePath = null;
      }

      function drawPlot() {
        const xKey = el('xCol').value;
        const yKey = el('yCol').value;
        const c = el('plotCanvas');
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        if (!xKey || !yKey || !latestRows.length) return;

        const points = latestRows
          .map((r) => ({ x: Number(r[xKey]), y: Number(r[yKey]) }))
          .filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
        if (!points.length) return;

        const minX = Math.min(...points.map((p) => p.x));
        const maxX = Math.max(...points.map((p) => p.x));
        const minY = Math.min(...points.map((p) => p.y));
        const maxY = Math.max(...points.map((p) => p.y));
        const pad = 24;
        const sx = (x) => pad + ((x - minX) / (maxX - minX || 1)) * (c.width - 2 * pad);
        const sy = (y) => c.height - pad - ((y - minY) / (maxY - minY || 1)) * (c.height - 2 * pad);

        ctx.strokeStyle = '#999';
        ctx.strokeRect(pad, pad, c.width - 2 * pad, c.height - 2 * pad);
        ctx.fillStyle = '#111';
        ctx.fillText(`${xKey}`, c.width / 2, c.height - 4);
        ctx.save();
        ctx.translate(6, c.height / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(`${yKey}`, 0, 0);
        ctx.restore();

        ctx.strokeStyle = '#2563eb';
        ctx.beginPath();
        points.forEach((p, i) => {
          const x = sx(p.x), y = sy(p.y);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        ctx.fillStyle = '#dc2626';
        points.forEach((p) => {
          ctx.beginPath();
          ctx.arc(sx(p.x), sy(p.y), 2.5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function renderRows(rows) {
        latestRows = rows || [];
        if (!latestRows.length) {
          el('resultsGrid').textContent = 'No rows';
          return;
        }
        const cols = [...new Set(latestRows.flatMap((r) => Object.keys(r)))];
        el('xCol').innerHTML = cols.map((c) => `<option>${c}</option>`).join('');
        el('yCol').innerHTML = cols.map((c) => `<option>${c}</option>`).join('');
        if (cols.length > 1) el('yCol').value = cols[1];

        const head = `<tr>${cols.map((c) => `<th>${c}</th>`).join('')}</tr>`;
        const body = latestRows
          .map((r) => `<tr>${cols.map((c) => `<td>${r[c] ?? ''}</td>`).join('')}</tr>`)
          .join('');
        el('resultsGrid').innerHTML = `<table>${head}${body}</table>`;
        drawPlot();
      }

      async function safeInvoke(cmd, payload) {
        if (!invoke) throw new Error('Tauri invoke API not available');
        return invoke(cmd, payload);
      }

      el('analyzeBtn').onclick = async () => {
        try {
          const data = await safeInvoke('parse_and_analyze', { equationsText: el('equations').value });
          const summary = data.identifiers?.length ? `Identifiers: ${data.identifiers.join(', ')}` : '';
          showDiagnostics({ summary, diagnostics: data.diagnostics || [] });
        } catch (err) {
          showDiagnostics({ textLines: [`Analyze failed: ${err}`] });
        }
      };

      function findEquationSnippetFromSpan(span) {
        if (!span?.line) return '';
        const lines = el('equations').value.split('\n');
        return (lines[span.line - 1] || '').trim();
      }

      el('solveBtn').onclick = async () => {
        try {
          const data = await safeInvoke('solve_program', { equationsText: el('equations').value, options: null });
          const summaryParts = [];
          if (data.status === 'ok') {
            summaryParts.push('Solve succeeded.');
          } else {
            summaryParts.push(`Solve failed (${data.status}).`);
            if (data.message) summaryParts.push(data.message);
            if (data.worst_residual?.span?.line) {
              const eq = findEquationSnippetFromSpan(data.worst_residual.span);
              if (eq) {
                summaryParts.push(`Max residual at line ${data.worst_residual.span.line}: ${eq}`);
              }
            }
          }
          if (data.iterations != null) summaryParts.push(`Iterations: ${data.iterations}`);
          if (data.final_norm != null) summaryParts.push(`Final norm: ${data.final_norm}`);

          const diagnostics = [...(data.diagnostics || [])];
          if (data.worst_residual?.span) {
            diagnostics.unshift({
              severity: 'error',
              source: 'solver',
              message: `Max residual ${data.worst_residual.residual}`,
              span: data.worst_residual.span,
            });
          }

          showDiagnostics({ summary: summaryParts.join(' '), diagnostics });
          showVariables(data.variables || {});
        } catch (err) {
          showDiagnostics({ textLines: [`Solve failed: ${err}`] });
        }
      };

      el('runTableBtn').onclick = async () => {
        try {
          const sweeps = JSON.parse(el('sweeps').value);
          const columns = JSON.parse(el('columns').value);
          const data = await safeInvoke('run_param_table', {
            equationsText: el('equations').value,
            tableSpec: { sweeps, columns },
            options: null,
          });
          const lines = [
            `Table status: ${data.status}`,
            ...(data.message ? [data.message] : []),
            ...(data.diagnostics || []).map((d) => `[${d.source}] L${d.span.line}: ${d.message}`),
          ];
          showDiagnostics({ textLines: lines, diagnostics: data.diagnostics || [] });
          renderRows(data.rows || []);
        } catch (err) {
          showDiagnostics({ textLines: [`Run table failed: ${err}`] });
          renderRows([]);
        }
      };

      el('xCol').onchange = drawPlot;
      el('yCol').onchange = drawPlot;

      async function openFromDisk() {
        try {
          const file = await safeInvoke('open_equations_file');
          el('equations').value = file.contents || '';
          currentFilePath = file.path || null;
          showDiagnostics({ textLines: [`Opened: ${currentFilePath}`] });
          showVariables({});
          renderRows([]);
        } catch (err) {
          if (!String(err).includes('canceled')) {
            showDiagnostics({ textLines: [`Open failed: ${err}`] });
          }
        }
      }

      async function saveToDisk(saveAs) {
        try {
          const file = await safeInvoke('save_equations_file', {
            equationsText: el('equations').value,
            currentPath: currentFilePath,
            saveAs,
          });
          currentFilePath = file.path || currentFilePath;
          showDiagnostics({ textLines: [`Saved: ${currentFilePath}`] });
        } catch (err) {
          if (!String(err).includes('canceled')) {
            showDiagnostics({ textLines: [`Save failed: ${err}`] });
          }
        }
      }

      if (listen) {
        listen('menu://file-new', clearWorkspace);
        listen('menu://file-open', () => { void openFromDisk(); });
        listen('menu://file-save', () => { void saveToDisk(false); });
        listen('menu://file-save-as', () => { void saveToDisk(true); });
        listen('menu://calculate-solve', () => { void el('solveBtn').onclick(); });
        listen('menu://calculate-analyze', () => { void el('analyzeBtn').onclick(); });
        listen('menu://tables-run', () => { void el('runTableBtn').onclick(); });
      }
    </script>
  </body>
</html>
